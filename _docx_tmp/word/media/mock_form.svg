      .title { fill: #050F1E; font-family: Arial, sans-serif; font-size: 24px; }
      .label { fill: #6B7788; font-family: Arial, sans-serif; font-size: 18px; }
      .accent { fill: #006D5B; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1400" height="900"/>
