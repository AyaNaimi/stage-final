      .actor { fill: #006D5B; font-family: Arial, sans-serif; font-size: 20px; }
      .line { stroke: #0B2545; stroke-width: 2; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1400" height="900"/>
