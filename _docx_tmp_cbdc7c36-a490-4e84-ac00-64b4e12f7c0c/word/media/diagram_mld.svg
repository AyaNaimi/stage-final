      .text { fill: #050F1E; font-family: Arial, sans-serif; font-size: 16px; }
      .line { stroke: #006D5B; stroke-width: 2; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1400" height="900"/>
  <rect class="box" x="80" y="80" width="260" height="120"/>
  <text class="title" x="100" y="110">employes</text>
