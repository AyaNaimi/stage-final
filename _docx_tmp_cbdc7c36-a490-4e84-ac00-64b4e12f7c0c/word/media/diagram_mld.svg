  <text class="text" x="780" y="320">examen_medical_id (FK)</text>
  <rect class="box" x="1080" y="80" width="260" height="120"/>
  <text class="title" x="1100" y="110">sst_practitioners</text>
  <rect class="box" x="1080" y="260" width="260" height="120"/>
  <text class="title" x="1100" y="290">sst_payments</text>
  <text class="text" x="1100" y="320">practitioner_id (FK)</text>
</svg>
