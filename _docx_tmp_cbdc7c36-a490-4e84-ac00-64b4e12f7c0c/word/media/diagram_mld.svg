  <rect class="box" x="420" y="80" width="260" height="120"/>
  <text class="title" x="440" y="110">dossier_medicals</text>
  <text class="text" x="440" y="140">employe_id (FK)</text>
  <rect class="box" x="760" y="80" width="260" height="120"/>
  <text class="title" x="780" y="110">visites</text>
  <text class="text" x="780" y="140">practitioner_id (FK)</text>
  <rect class="box" x="80" y="260" width="260" height="120"/>
  <text class="title" x="100" y="290">examen_medicals</text>
